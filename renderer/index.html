<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gallery-gauntlet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="open-btn" type="button" class="btn">Open Folder</button>
      <span id="folder-path" class="folder-path">No folder selected</span>
      <span id="position" class="position"></span>
    </header>

    <main class="viewer">
      <p id="empty" class="empty">Open a folder to start sorting.</p>

      <div id="file-view" class="file-view" hidden>
        <!-- Batch 3 will render the image / file icon above the name. -->
        <div id="file-name" class="file-name"></div>
      </div>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
