<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' gg:; media-src 'self' gg:" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gallery-gauntlet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="open-btn" type="button" class="btn primary">Open Folder</button>
      <select id="sort-select" class="sort-select" title="Sort order">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="random">Random</option>
      </select>
      <label class="include-sorted">
        <input type="checkbox" id="include-sorted" /> Include sorted
      </label>
      <span id="folder-path" class="folder-path">No folder selected</span>
      <span id="position" class="position"></span>
      <button id="mute-btn" type="button" class="btn btn-icon" hidden
              title="Mute videos" aria-label="Mute videos">🔊</button>
      <button id="theme-toggle" type="button" class="btn btn-icon"
              title="Toggle light/dark" aria-label="Toggle theme">🌙</button>
    </header>

    <main class="viewer">
      <p id="empty" class="empty">Open a folder to start sorting.</p>

      <div id="file-view" class="file-view" hidden>
        <div id="file-display" class="file-display"></div>
        <div id="file-name" class="file-name"></div>
      </div>
    </main>

    <section class="dock">
      <div id="dock-tiles" class="dock-tiles"></div>
      <div class="dock-status">
        <span id="capture-hint" class="capture-hint" hidden></span>
        <span class="undo-hint">Ctrl+Z: undo</span>
      </div>
    </section>

    <div id="toast" class="toast" hidden></div>

    <script src="renderer.js"></script>
  </body>
</html>
